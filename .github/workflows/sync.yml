name: Sync comic releases

on:
  schedule:
    # Lunes a las 07:00 UTC (08:00 CET / 09:00 CEST — hora de Madrid)
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  sync:
    runs-on: [self-hosted, Windows, X64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # lxml 4.9.x (requerido por comicgeeks) tiene wheel para 3.12, no para 3.13
          python-version: '3.12'

      - name: Debug - runner environment
        run: python -c "import platform, socket, urllib.request; print('OS:', platform.system(), platform.release()); print('Host:', socket.gethostname()); print('IP:', urllib.request.urlopen('https://api.ipify.org').read().decode())"

      - name: Install dependencies
        run: pip install -r worker/requirements.txt

      - name: Run sync worker
        run: python worker/main.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LOCG_CI_SESSION: ${{ secrets.LOCG_CI_SESSION }}
