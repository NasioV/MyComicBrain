name: Sync comic releases

on:
  schedule:
    # Lunes a las 07:00 UTC (08:00 CET / 09:00 CEST — hora de Madrid)
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  sync:
    runs-on: [self-hosted, Windows, X64]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        # py -3.12 usa el Python Launcher de Windows para seleccionar Python 3.12
        # (debe estar instalado en el PC con "Install for all users")
        run: py -3.12 -m pip install -r worker/requirements.txt

      - name: Run sync worker
        run: py -3.12 worker/main.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LOCG_CI_SESSION: ${{ secrets.LOCG_CI_SESSION }}
