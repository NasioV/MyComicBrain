<header class="nav">
  <div class="nav-top">
    <a class="nav-brand" routerLink="/">
      <span class="brand-full">MyComicBrain</span>
      <span class="brand-short">MCB</span>
    </a>
    <div class="nav-actions">
      <a routerLink="/new-releases" routerLinkActive="active" class="new-releases-link">New Releases</a>
      <a routerLink="/add" routerLinkActive="active">Añadir</a>

      <div class="profile">
        <button class="profile-btn" (click)="toggleMenu()" [class.open]="menuOpen()">
          <span class="avatar">
            @if (avatar()) {
              <img [src]="avatar()" alt="" />
            } @else {
              {{ initials() }}
            }
          </span>
          <span class="profile-name">{{ username() }}</span>
          <span class="caret">▾</span>
        </button>

        @if (menuOpen()) {
          <div class="menu-backdrop" (click)="closeMenu()"></div>
          <div class="profile-menu">
            <a routerLink="/settings" routerLinkActive="active" (click)="closeMenu()">⚙ Configuración</a>
            <button class="menu-signout" (click)="signOut()">Salir</button>
          </div>
        }
      </div>
    </div>
  </div>

  <nav class="nav-tabs">
    <a routerLink="/dc"     routerLinkActive="active" class="tab-dc">DC</a>
    <a routerLink="/marvel" routerLinkActive="active" class="tab-marvel">Marvel</a>
    <a routerLink="/otros"  routerLinkActive="active" class="tab-otros">Otros</a>
  </nav>
</header>
